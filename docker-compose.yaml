# Local development stack:
#   - genie-api    (the service)
#   - postgres     (persistence)
#   - otel-collector (receives OTLP, fans out to Tempo)
#   - tempo        (trace backend)
#   - grafana      (UI)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: genie
      POSTGRES_PASSWORD: genie
      POSTGRES_DB: genie
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genie -d genie"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/local/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # tempo http
      - "9095:9095"   # tempo grpc

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./deploy/local/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP http
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/local/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    ports:
      - "3000:3000"
    depends_on:
      - tempo

  genie-api:
    build: .
    environment:
      GENIE_HTTP_ADDR: ":8080"
      GENIE_JWT_SECRET: "dev-only-jwt-secret-change-me"
      # 32-byte key, base64 encoded. Generate with: openssl rand -base64 32
      GENIE_KEK_BASE64: "K7m9OQM63z7ZK3xQ2lG0qV9hC5Yf+e0sQ+kXcM3GqQE="
      GENIE_DB_DSN: "postgres://genie:genie@postgres:5432/genie?sslmode=disable"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      GENIE_OTEL_INSECURE: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  postgres-data:
