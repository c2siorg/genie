openapi: 3.0.3
info:
  title: Genie API
  version: 0.1.0
  description: |
    Genie is a multi-agent AI financial assistant. The HTTP surface is a thin
    edge: requests translate to messages on the in-process bus, which routes
    them through specialist agents (ingest → normalize → enrich → analyze →
    fan-out → report).
servers:
  - url: http://localhost:8080
    description: Local docker-compose

tags:
  - name: users
  - name: accounts
  - name: documents
  - name: ask
  - name: mcp
  - name: incidents
  - name: governance
  - name: debug
  - name: health

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
  /readyz:
    get:
      tags: [health]
      summary: Readiness probe — pings DB
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  /v1/users:
    post:
      tags: [users]
      summary: Sign up a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400': { description: Invalid input }
        '409': { description: Email already exists }

  /v1/users/login:
    post:
      tags: [users]
      summary: Exchange credentials for a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401': { description: Invalid credentials }

  /v1/users/me:
    get:
      tags: [users]
      security: [{ bearer: [] }]
      summary: Current user's public profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '401': { description: Unauthenticated }

  /v1/accounts:
    get:
      tags: [accounts]
      security: [{ bearer: [] }]
      summary: List accounts for the authenticated user
      responses:
        '200':
          description: Array of accounts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Account' }
    post:
      tags: [accounts]
      security: [{ bearer: [] }]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAccountRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }

  /v1/documents:
    post:
      tags: [documents]
      security: [{ bearer: [] }]
      summary: Upload an encrypted CSV document
      parameters:
        - in: query
          name: description
          schema: { type: string }
        - in: query
          name: classification
          schema:
            type: string
            enum: [public, internal, pii, secret]
            default: pii
      requestBody:
        required: true
        content:
          text/csv:
            schema: { type: string }
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '201':
          description: Stored (encrypted at rest)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '413': { description: Payload too large }
    get:
      tags: [documents]
      security: [{ bearer: [] }]
      summary: Document metadata (never returns plaintext)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Metadata
        '404': { description: Not found }

  /v1/mcp/tokens:
    post:
      tags: [mcp]
      security: [{ bearer: [] }]
      summary: Store an encrypted MCP session token for a remote provider
      description: |
        The token plaintext only lives in memory long enough to be sealed
        with the envelope encryption (pkg/crypto). Use this for Zerodha Kite
        and any other MCP provider Genie should reach on the user's behalf.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreMCPTokenRequest' }
      responses:
        '201':
          description: Stored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StoreMCPTokenResponse' }

  /mcp:
    post:
      tags: [mcp]
      summary: MCP JSON-RPC endpoint (Genie as an MCP server)
      description: |
        Streamable-HTTP MCP transport. Supports initialize, tools/list, and
        tools/call. Exposes Genie's read-only agents (explain_finance,
        macro_context, rate_outlook) as MCP tools.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema: { type: object }

  /v1/incidents:
    post:
      tags: [incidents]
      security: [{ bearer: [] }]
      summary: Submit an AI incident (Annexure VI form)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Incident' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Incident' }
    get:
      tags: [incidents]
      security: [{ bearer: [] }]
      summary: List recent incidents (admin only)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: Array of incidents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Incident' }
        '403': { description: admin role required }

  /v1/ai-inventory:
    get:
      tags: [governance]
      security: [{ bearer: [] }]
      summary: Registered AI agent inventory (RBI FREE-AI Rec 23)
      responses:
        '200':
          description: Array of inventory items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InventoryItem' }
        '403': { description: admin role required }

  /v1/disclosures:
    get:
      tags: [governance]
      summary: Public AI governance disclosure (RBI FREE-AI Rec 25)
      description: |
        Returns the board-approved policy version, principles in force, agent
        counts by risk class, and the incident reporting URL. No auth.
      responses:
        '200':
          description: Disclosure summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_version: { type: string }
                  policy_approved_on: { type: string }
                  principles: { type: array, items: { type: string } }
                  home_region: { type: string }
                  incident_reporting_url: { type: string }
                  agent_counts: { type: object }

  /debug/pprof/{profile}:
    get:
      tags: [debug]
      security: [{ bearer: [] }]
      summary: Live profiling (admin only)
      parameters:
        - in: path
          name: profile
          required: true
          schema:
            type: string
            enum: [heap, goroutine, allocs, block, mutex, profile, threadcreate, trace]
      responses:
        '200':
          description: Profile payload (pprof binary or text)
        '401': { description: Unauthenticated }
        '403': { description: Forbidden (admin role required) }

  /v1/ask:
    post:
      tags: [ask]
      security: [{ bearer: [] }]
      summary: Ask Genie a finance question against a stored document
      description: |
        Publishes a finance_question onto the bus. The supervisor decrypts the
        document, runs the pipeline, and returns a human-readable report.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AskRequest' }
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AskResponse' }
        '504': { description: Pipeline timed out }

components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      properties:
        token: { type: string }
        expires_at: { type: integer, format: int64 }
        user: { $ref: '#/components/schemas/PublicUser' }
    PublicUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        roles:
          type: array
          items: { type: string, enum: [user, advisor, admin] }
    Account:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        name: { type: string }
        currency: { type: string }
        created_at: { type: string, format: date-time }
    CreateAccountRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        currency: { type: string, default: INR }
    UploadResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        classification: { type: string }
        description: { type: string }
        kek_id: { type: string }
    AskRequest:
      type: object
      required: [question, document_id]
      properties:
        question: { type: string }
        document_id: { type: string, format: uuid }
    AskResponse:
      type: object
      properties:
        trace_id: { type: string }
        report: { type: string }
    StoreMCPTokenRequest:
      type: object
      required: [provider, endpoint, token]
      properties:
        provider:
          type: string
          example: zerodha-kite
        endpoint:
          type: string
          example: https://mcp.kite.trade/mcp
        token:
          type: string
    Incident:
      type: object
      required: [use_case, description]
      properties:
        id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        detected_at: { type: string, format: date-time }
        use_case: { type: string, example: credit_decisioning }
        model: { type: string, example: recommender_v1 }
        third_party_vendor: { type: string }
        description: { type: string }
        affected_stakeholders:
          type: string
          enum: [internal, external, both]
        severity:
          type: string
          enum: [low, moderate, high]
          default: low
        failure_mode:
          type: string
          enum:
            - bias
            - hallucination
            - explainability_gap
            - privacy_breach
            - unintended_action
            - policy_denied
            - agent_error
            - unknown
        root_cause: { type: string }
        response_actions: { type: string }
        status:
          type: string
          enum: [ongoing, resolved]
        actor_id: { type: string }
        metadata: { type: object }
    InventoryItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        capabilities: { type: array, items: { type: string } }
        risk_class:
          type: string
          enum: [low, medium, high]
        has_fallback: { type: boolean }
        fallback_id: { type: string }
    StoreMCPTokenResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        provider: { type: string }
        endpoint: { type: string }
        kek_id: { type: string }
